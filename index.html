<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Komanda 33 - Praktiskais darbs 1</title>
</head>
<body>
<main class="flex flex-col justify-center min-h-screen w-full p-10">
    <!--  1. solis - izvēlēties kas sāk spēli  -->
    <div id="firstStep" class="flex flex-col gap-5 justify-center items-center bg-neutral-100 border border-neutral-300 rounded-lg p-5">

        <!--   progresa līnija (šis tikai vizuāli)   -->
        <div class="grid grid-cols-3 gap-3 w-full">
            <span class="bg-sky-500 h-[4px] w-full rounded-lg"></span>
            <span class="bg-neutral-200 h-[4px] w-full rounded-lg"></span>
            <span class="bg-neutral-200 h-[4px] w-full rounded-lg"></span>
        </div>

        <h1 class="text-4xl font-bold mt-5">1. Izvēlies kas sāk spēli</h1>

        <div class="w-full grid grid-cols-2 gap-5 text-white">
            <button id="chooseHuman" class="py-10 rounded-lg bg-sky-500 hover:bg-sky-600 duration-200 cursor-pointer">Cilvēks</button>
            <button id="chooseComputer" class="p-5 rounded-lg bg-sky-500 hover:bg-sky-600 duration-200 cursor-pointer">Dators</button>
        </div>
    </div>

    <!--  2. solis - algoritma izvēle  -->
    <div id="secondStep" class="hidden flex flex-col gap-5 justify-center items-center bg-neutral-100 border border-neutral-300 rounded-lg p-5">

        <!--   progresa līnija (šis tikai vizuāli)   -->
        <div class="grid grid-cols-3 gap-3 w-full">
            <span class="bg-sky-500 h-[4px] w-full rounded-lg"></span>
            <span class="bg-sky-500 h-[4px] w-full rounded-lg"></span>
            <span class="bg-neutral-200 h-[4px] w-full rounded-lg"></span>
        </div>

        <h1 class="text-4xl font-bold mt-5">2. Izvēlies datora algoritmu</h1>

        <div class="w-full grid grid-cols-2 gap-5 text-white">
            <button id="chooseMinMax" class="py-10 rounded-lg bg-sky-500 hover:bg-sky-600 duration-200 cursor-pointer">Min-Max</button>
            <button id="chooseAlfaBeta" class="py-10 rounded-lg bg-sky-500 hover:bg-sky-600 duration-200 cursor-pointer">Alfa-Beta</button>
        </div>
    </div>

    <!--  3. - ģenerētā sākuma skaitļa izvēle  -->
    <div id="thirdStep" class="hidden flex flex-col gap-5 justify-center items-center bg-neutral-100 border border-neutral-300 rounded-lg p-5">

        <!--   progresa līnija (šis tikai vizuāli)   -->
        <div class="grid grid-cols-3 gap-3 w-full">
            <span class="bg-sky-500 h-[4px] w-full rounded-lg"></span>
            <span class="bg-sky-500 h-[4px] w-full rounded-lg"></span>
            <span class="bg-sky-500 h-[4px] w-full rounded-lg"></span>
        </div>

        <h1 class="text-4xl font-bold mt-5">3. Izvēlies ar kādu skaitli sākt spēli</h1>

        <div class="w-full grid grid-cols-5 gap-5 text-white" id="options">
            <!-- šeit parādīsies ģenerētie skaitļi kā pogas -->
        </div>
    </div>

    <!--  spēles konteiners  -->
    <div class="hidden w-full p-5 flex flex-col gap-10" id="gameContainer">
        <!--   spēles stāvokļa konteiners     -->
        <div class="flex justify-between items-center gap-5">
            <div class="flex flex-col items-center p-5 rounded-lg bg-neutral-100 border border-neutral-300 w-[250px]">
                <p>Tavi punkti</p>
                <span id="humanPoints" class="text-6xl font-black">0</span>
            </div>
            <div class="flex flex-col items-center">
                <p class="text-lg font-semibold">Šī brīža skaitlis</p>
                <span id="currentNumber" class="text-8xl font-black">0</span>
            </div>
            <div class="flex flex-col items-center p-5 rounded-lg bg-neutral-100 border border-neutral-300 w-[250px]">
                <p>Datora punkti</p>
                <span id="computerPoints" class="text-6xl font-black">0</span>
            </div>
        </div>

        <!--   pogu konteiners    -->
        <div id="buttons" class="grid grid-cols-2 gap-5 w-full text-white">
            <button id="divideByTwo" class="flex flex-col items-center py-15 rounded-lg bg-sky-500 hover:bg-sky-600 duration-200 cursor-pointer text-2xl">
                <span class="uppercase font-semibold">Dalīt ar 2</span>
                <span class="text-sm text-neutral-200 italic">+2 punkti datoram</span>
            </button>
            <button id="divideByThree" class="flex flex-col items-center py-15 rounded-lg bg-sky-500 hover:bg-sky-600 duration-200 cursor-pointer text-2xl">
                <span class="uppercase font-semibold">Dalīt ar 3</span>
                <span class="text-sm text-neutral-200 italic">+3 punkti Tev</span>
            </button>
        </div>

        <!--  rezultātu konteiners  -->
        <div id="resultContainer" class="hidden flex flex-col gap-5 w-full justify-center items-center py-10">
            <p class="text-center text-6xl font-bold" id="result"></p>
            <button onclick="window.location.reload()" class="bg-sky-500 cursor-pointer hover:bg-sky-600 duration-200 px-20 py-5 rounded-lg text-white">Jauna spēle</button>
        </div>

        <!--   gājienu saraksts    -->
        <div class="w-full flex flex-col justify-center w-[500px]">
            <h2 class="text-2xl pb-2 font-bold">Iepriekšējo gājienu saraksts</h2>
            <div class="flex flex-col border border-neutral-300 rounded-lg overflow-hidden">
                <div class="grid grid-cols-5 bg-neutral-100 text-semibold p-2 text-center">
                    <div>Gājiena Nr.</div>
                    <div>Gājiens</div>
                    <div>Datora punkti</div>
                    <div>Tavi punkti</div>
                    <div>Skaitlis</div>
                </div>
                <div id="history" class="bg-white p-1 grid grid-cols-5 text-center">
                </div>
            </div>
        </div>
    </div>
</main>
</body>
<script type="module" src="./script.js"></script>
</html>
