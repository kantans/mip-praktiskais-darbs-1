<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="style/style.css" rel="stylesheet" />
    <title>Komanda 33 - Praktiskais darbs 1</title>
</head>
<body>
<main>
    <!--  1. solis - izvēlēties kas sāk spēli  -->
    <div id="firstStep">
        <h1>Izvēlies kas sāk spēli</h1>
        <button id="chooseHuman">Cilvēks</button>
        <button id="chooseComputer">Dators</button>
    </div>

    <!--  2. solis - algoritma izvēle  -->
    <div class="hidden" id="secondStep">
        <h1>Izvēlies datora algoritmu</h1>
        <button id="chooseMinMax">min-max</button>
        <button id="chooseAlfaBeta">alfa-beta</button>
    </div>

    <!--  3. - ģenerētā sākuma skaitļa izvēle  -->
    <div class="hidden" id="thirdStep">
        <h1>Izvēlies ar kādu skaitli sākt spēli</h1>
        <div id="options">
            <!-- šeit parādīsies ģenerētie skaitļi kā pogas -->
        </div>
    </div>

    <!--  Pats spēles konteiners  -->
    <div class="hidden" id="gameContainer">
        <h1>Spēle</h1>
    </div>
</main>
</body>
<script type="module" src="./script.js"></script>
</html>
